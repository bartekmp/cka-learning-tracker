<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CKA Study Tracker</title>
		<link rel="icon" href="favicon.svg" type="image/svg+xml" />
		<link rel="stylesheet" href="css/shared.css" />
		<link rel="stylesheet" href="css/tracker.css" />
		<meta
			name="description"
			content="Track your CKA exam progress across all 9 sections with checkable topics, progress bars, a kubectl cheatsheet, and ADHD-friendly study tips."
		/>
		<meta property="og:title" content="CKA Study Tracker" />
		<meta
			property="og:description"
			content="Track your CKA exam progress across all 9 sections with checkable topics, progress bars, a kubectl cheatsheet, and ADHD-friendly study tips."
		/>
		<meta property="og:type" content="website" />
		<meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
		<script>
			!(function () {
				var e = new URLSearchParams(window.location.search).get('theme'),
					t =
						e === 'dark' || e === 'light'
							? e
							: localStorage.getItem('cka-theme') ||
								(matchMedia('(prefers-color-scheme:dark)').matches
									? 'dark'
									: 'light');
				if (t === 'dark') document.documentElement.classList.add('dark');
			})();
		</script>
	</head>

	<body>
		<div
			id="autosave-bar"
			class="autosave-bar state-none"
			style="max-width: 820px; margin: 0 auto 18px"
		>
			<span class="autosave-icon" id="as-icon">💾</span>
			<span class="autosave-text" id="as-text">Setting up…</span>
			<span class="as-flash" id="as-flash"></span>
		</div>
		<div id="root"></div>

		<footer
			style="
				max-width: 820px;
				margin: 48px auto 0;
				padding: 20px 0 40px;
				border-top: 0.5px solid rgba(0, 0, 0, 0.1);
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				justify-content: space-between;
				gap: 12px;
				font-size: 11px;
				color: #888;
			"
		>
			<span>
				<a href="index.html" style="color: #2563eb; text-decoration: none"
					>← Back to project home</a
				>
			</span>
			<span style="text-align: center; flex: 1; min-width: 200px">
				<a
					href="https://github.com/bartekmp/cka-learning-tracker"
					target="_blank"
					rel="noreferrer"
					style="color: #2563eb; text-decoration: none"
					>bartekmp/cka-learning-tracker</a
				>
				&nbsp;·&nbsp; Licensed under
				<a
					href="https://www.apache.org/licenses/LICENSE-2.0"

					style="color: #2563eb; text-decoration: none"
					>Apache 2.0</a

			<span

					rel="noreferrer"
					style="color: #2563eb; text-decoration: none"
					>__APP_VERSION__</a
				></span

		<script src="js/autosave.js"></script>
		<script src="data/tracker-data.js"></script>

		<script src="js/pomodoro.js"></script>
	</body>
</html>

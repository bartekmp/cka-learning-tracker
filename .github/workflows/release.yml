name: Release

on:
    push:
        branches:
            - main

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Determine skip and bump type
              id: meta
              env:
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  if echo "$COMMIT_MSG" | grep -qF '[skip ci]'; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  echo "skip=false" >> "$GITHUB_OUTPUT"
                  if echo "$COMMIT_MSG" | grep -qiE '\bfeature\b'; then
                      echo "bump=minor" >> "$GITHUB_OUTPUT"
                  else
                      echo "bump=patch" >> "$GITHUB_OUTPUT"
                  fi

            - name: Resolve latest version tag
              if: steps.meta.outputs.skip != 'true'
              id: latest
              run: |
                  TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
                  echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

            - name: Compute next version
              if: steps.meta.outputs.skip != 'true'
              id: next
              env:
                  LATEST_TAG: ${{ steps.latest.outputs.tag }}
                  BUMP: ${{ steps.meta.outputs.bump }}
              run: |
                  VER="${LATEST_TAG#v}"
                  MAJOR="${VER%%.*}"
                  REST="${VER#*.}"
                  MINOR="${REST%%.*}"
                  PATCH="${REST#*.}"
                  if [ "$BUMP" = "minor" ]; then
                      MINOR=$((MINOR + 1))
                      PATCH=0
                  else
                      PATCH=$((PATCH + 1))
                  fi
                  echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

            - name: Tag commit and create GitHub Release
              if: steps.meta.outputs.skip != 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NEW_TAG: ${{ steps.next.outputs.tag }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag "$NEW_TAG"
                  git push origin "$NEW_TAG"
                  gh release create "$NEW_TAG" \
                      --title "Release $NEW_TAG" \
                      --generate-notes
